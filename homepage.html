<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Homepage</title>
  
  <!-- styleshit -->
     <link rel="stylesheet" href="./style/style.css">

  <!-- daisu ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
    rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body { font-family: 'Geist', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen ">
    <!-- search button -->
    <section>
       <header>
            <div class="navbar flex md:flex-row flex-col justify-between gap-5  px-15 py-5">
                <div class="logo flex items-center gap-2 ">
                    <img class="w-10 h-10 " src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                </div>
                <div class="searchbar">
                    <div class="join gap-2">
                    <div>
                        <label class="input validator join-item">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </g>
                        </svg>
                        <input type="text" placeholder="Search issues..." required />
                        </label>
                        
                    </div>
                    <button class="btn btn-primary join-item">
                        <i class="fa-solid fa-plus"></i>New Issue
                    </button>
                    </div>
                </div>
            </div>
       </header>
    </section>

    <!-- button section  -->
    <section>
        <div class=" bg-white w-9/12 justify-center mx-auto p-6 gap-2 m-10">
            <button class="btn btn-primary w-25">All</button>
            <button class="btn w-25">Open</button>
            <button class="btn w-25 ">Closed</button>
        </div>
    </section>
    <!-- count section  -->
    <section>
        <div class="bg-white w-9/12 justify-center mx-auto p-6 gap-2">
            <div class="flex justify-between">
                <div class="lest flex gap-2 items-center">
                    <img class="w-10 h-10" src="./assets/Aperture.png" alt="">
                    <div class="w-full">
                        <h2 class="font-semibold">50 Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
            <div class="right flex gap-2">
                <span><i class="fa-solid fa-circle text-green-600"></i> Open</span>
                <span><i class="fa-solid fa-circle text-[#8a2be2]"></i> Closed</span>

            </div>
            </div>
        </div>
    </section>

    <!-- card section  -->

    <section>
        
<!--  -->
    </section>
        <div id="level-container" class="w-9/12  mx-auto p-6 gap-2 m-10 grid grid-flow-row md:grid-cols-3 ">
            
        </div>
    <script src="./script/script.js"></script>
</body>
</html>
